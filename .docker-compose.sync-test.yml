services:
  api:
    image: yuxi-sync-api:0.7.0.beta2
    container_name: yuxi-sync-api
    ports: !override
      - "15050:5050"

  worker:
    image: yuxi-sync-api:0.7.0.beta2
    container_name: yuxi-sync-worker

  sandbox-provisioner:
    image: yuxi-sync-sandbox-provisioner:0.7.0.beta2
    container_name: yuxi-sync-sandbox-provisioner
    ports: !override
      - "18002:8002"
    environment:
      PROVISIONER_BACKEND: memory
      DOCKER_NETWORK: yuxi-sync-isolated-network
      DOCKER_SANDBOX_PREFIX: yuxi-sync-sandbox

  web:
    image: yuxi-sync-web:0.7.0.beta2
    container_name: yuxi-sync-web
    build: !override
      context: .
      dockerfile: docker/web.sync-test.Dockerfile
    volumes: !override
      - ./web/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports: !override
      - "15173:80"
    command: ["nginx", "-g", "daemon off;"]

  graph:
    container_name: yuxi-sync-graph
    ports: !override
      - "17474:7474"
      - "17687:7687"

  etcd:
    container_name: yuxi-sync-etcd

  minio:
    container_name: yuxi-sync-minio
    ports: !override
      - "19000:9000"
      - "19001:9001"

  milvus:
    container_name: yuxi-sync-milvus
    ports: !override
      - "29530:19530"
      - "29091:9091"

  postgres:
    container_name: yuxi-sync-postgres
    volumes: !override
      - sync_postgres_data:/var/lib/postgresql/data
    ports: !override
      - "15432:5432"

  redis:
    container_name: yuxi-sync-redis
    ports: !override
      - "16379:6379"

volumes:
  sync_postgres_data:
