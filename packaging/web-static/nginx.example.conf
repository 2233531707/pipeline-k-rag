# Example external Nginx site for Yuxi separated Web deployment.
# Replace app.example.com, /var/www/yuxi-web and yuxi_api with your real values.

upstream yuxi_api {
    # Recommended when Nginx and Docker Compose run on the same server with
    # an API host port bound to 127.0.0.1 only.
    server 127.0.0.1:15050;
}

server {
    listen 80;
    server_name app.example.com;

    root /var/www/yuxi-web;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/knowledge/portable-import {
        client_max_body_size 6G;
        proxy_request_buffering off;

        proxy_pass http://yuxi_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
    }

    location /api/ {
        proxy_pass http://yuxi_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
    }
}
